name: Sonar analysis

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PySonar
        run: |
          python -m pip install --upgrade pip
          python -m pip install pysonar

      - name: Run PySonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          pysonar \
            --sonar-token="$SONAR_TOKEN" \
            --sonar-project-key=research-projects-all_sibtc-django-beginners-guide-main-tutorial-18 \
            --sonar-organization=research-projects-all \
            --sonar-python-version=3.11
